<!DOCTYPE html>
<html>
<head>
  <base href="/Ecoexist_PWA/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Ecoexist Monitoring System">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Ecoexist">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/Icon-192.png"/>

  <title>Ecoexist monitoring app</title>
  <link rel="manifest" href="manifest.json">

  <!-- Register service worker immediately so Chrome shows install icon in address bar (before auth) -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('flutter_service_worker.js').catch(function() {});
    }
  </script>

  <!-- Firebase SDKs -->
  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="auth-service.js"></script>
  <script type="module" src="auth-ui.js"></script>
  <script type="module" src="auth-controller.js"></script>
  <script src="app-update.js"></script>
  <script src="pwa-install.js"></script>
</head>
<body>
  <script src="flutter_bootstrap.js" id="flutter-bootstrap-script"></script>
</body>
</html>
